    <style>
        
body {
    font-family: 'Poppins',sans-serif;
    margin: 0;
    background-color: rgb(247, 246, 246);
}

/*ESTILO DO CABEÇALHO*/

header{
    width:100%;
    padding: 10px 0;
}

header .interface{
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding-left: 100px;
    padding-right: 80px;
}

header .logotipo img{
    height:50px;
    width:50px;
    border-radius: 50%;
}

header nav.menu ul{
    display: flex;
    align-items: center;
    gap: 40px;
    list-style: none;
}

nav.menu ul li a{
    color:#14374d;
    text-decoration: none;    
}

nav.menu ul li :hover{
    color:#cf9c7b;
    text-decoration: none; 
    border-bottom: 3px solid #cf9c7b;   
}

.inicio{
    color:#cf9c7b;
    border-bottom: 3px solid #cf9c7b;
}

.gallery-container {
    max-width: 1200px;
    margin: 30px auto;    
    text-align: center; 
    margin-top: -35px;   
}

.fundo-container{
    height:1100px;
    background-color: rgb(235, 200, 178);
}


.gallery-title {
    font-size: 2rem;
    color:white;  
    padding: 40px;  
}

.image-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); /* Cria colunas flexíveis de no mínimo 250px */
    gap: 15px; /* Espaçamento entre as imagens */
    margin-top: -30px;
   border-radius:10px;    
}

.image-item img {
    width:100%;
    height: 100%;
    object-fit: cover; /* Mantém a proporção da imagem e cobre o contêiner */
   border-radius:10px;
}

.image-item:hover {
    transform: scale(1.05);
}

.image-item img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    cursor:pointer;
}


.modal {
    display: none;
    position: fixed;
    z-index: 10;
    left: 0;
    top: 0;
    width: 100%;
    height: 100%;
    background-color: rgba(0, 0, 0, 0.8);
    text-align: center;
    padding-top: 60px;
}

.modal-content {
    max-width: 80%;
    max-height: 80vh;
    border-radius: 10px;
}

.close {
    position: absolute;
    top: 20px;
    right: 30px;
    font-size: 40px;
    color: white;
    cursor: pointer;
}

    .footer-simple-container {
        background-color: white;
        color: #14374d;
        padding: 20px;
        text-align: center;
        font-size: 0.9em;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 10px;
    }

    .footer-simple-container p {
        margin: 0;
    }


/*RESPONSIVIDADE*/

@media (max-width: 768px) {
    header .interface {
        flex-direction: column;
        text-align: center;
    }

    header nav.menu ul {
        flex-direction: column;
        gap: 10px;
    }

    .image-grid {
        grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    }

    .gallery-title{
        font-size: 1.5rem;
    }
}

@media (max-width: 480px) {
    header .logotipo img{
        height: 40px;
        width: 40px;
    }

    nav.menu ul li a{
        font-size: 0.9rem;
        padding: 8px;
    }
}

/*ANIMAÇÃO*/

@keyframes animaTexto{
    100%{        
        transform: translateY(0);        
        opacity: 1;
        transition: 3s;        
    }
    
}   

.gallery-title, .image-grid{
    transform: translateY(60px);
    opacity: 0;
    animation: animaTexto .5s ease-in-out .7s forwards;
}

.gallery-title{
    animation-delay: 1s;
}

.image-grid{
    animation-delay: 2s;
}

    </style>
