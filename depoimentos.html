<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sonhos Assessoria de Eventos e Cerimoniais</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
</head>
<body>
    <style>
                    
        /* Estilos globais */
        *{
            margin:0;
            padding:0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background-color: rgb(235, 200, 178);
        }

        /* --- ESTILO DO CABEÇALHO --- */
        header{
            width:100%;
            z-index:999999999999999;
            padding: 10px 0;
            position: relative; /* Adicionado para posicionar o menu mobile */
            background-color: white;
        }

        header .interface{
            max-width: 1280px; /* Adicionado para centralizar o conteúdo do cabeçalho */
            margin: 0 auto; /* Adicionado para centralizar o conteúdo do cabeçalho */
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 2%; /* Adicionado para dar um respiro nas laterais */
        }

        header .logotipo img{
            width:7rem;
        }

        /* --- Estilo do Menu Desktop --- */
        header nav.menu-desktop ul{ /* Renomeado de .menu para .menu-desktop */
            display: flex;
            align-items: center;
            gap: 40px;
            list-style: none;
        }

        nav.menu-desktop ul li a{
            color:#14374d;
            text-decoration: none;
        }

        nav.menu-desktop ul li a:hover{ /* Corrigido para a:hover */
            color:#cf9c7b;
        }

        .depoimentos{
            color:#cf9c7b;
        }

        /* --- Estilo do Menu Mobile --- */
        .btn-abrir-menu {
            display: none; /* Oculto por padrão, só aparece em mobile */
            font-size: 2.5rem;
            cursor: pointer;
            color:#14374d;    
        }

        .menu-mobile {
            background-color:#14374d;
            color: #f7f7f7;
            position: fixed;
            top: 0;
            right: 0;
            width: 0%; /* Começa fechado */
            height: 100vh;
            z-index: 99999;
            transition: .5s;
            overflow: hidden; /* Garante que o conteúdo não vaze enquanto fechado */
        }

        .menu-mobile.abrir-menu {
            width: 70%; /* Largura quando aberto */
        }

        .menu-mobile.abrir-menu ~ .overlay-menu {
            display: block;
        }

        .menu-mobile .btn-fechar-menu {
            color: white;
            font-size: 2.5rem;
            padding: 20px 5%;
            cursor: pointer;
            text-align: right;
        }

        nav ul {
            list-style: none;
            text-align: center;
        }

        nav ul li {
            padding: 15px 0;
        }

        nav ul li a {
            color: white;
            font-size: 1.1rem;
            text-decoration: none;
            display: block;
            text-align: center;
        }

        nav ul li a:hover {
            color: #cf9c7b;
        }

        .overlay-menu {
            background-color: #000000a6;
            width: 100%;
            height: 100%;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 9999;
            display: none; /* Oculto por padrão */
        }

        /* --- Estilos do Conteúdo Principal --- */
        .fundo-container {
            width: 90%;
            margin: 0 auto;
            padding-top: 20px; /* Adicionado para espaçamento */
        }

        .gallery-container {
            max-width: 1200px;
            margin: 50px auto; 
            text-align: center;
            color:#14374d;
            background-color: rgb(235, 200, 178);
            padding: 30px; 
        }

        .image-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }

        .image-item {
            overflow: hidden;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            cursor: pointer;
            transition: transform 0.3s ease;
        }

        .image-item:hover {
            transform: scale(1.03);
        }

        .image-item img {
            width: 100%;
            height: 200px; /* Altura fixa para as imagens da galeria */
            object-fit: cover; /* Garante que a imagem cubra o espaço sem distorcer */
            display: block;
        }

        /* --- MODAL (Lightbox) --- */
.modal {
    display: none;
    position: fixed;
    z-index: 10;
    left: 0;
    top: 0;
    width: 100%;
    height: 100%;
    background-color: rgba(0, 0, 0, 0.8);
    text-align: center;
    padding-top: 120px;
}

.modal-content {
    max-width: 80%;
    max-height: 80vh;
    border-radius: 10px;
}

.close {
    position: absolute;
    top: 20px;
    right: 30px;
    font-size: 40px;
    color: white;
    cursor: pointer;
}
        .close:hover,
        .close:focus {
            color: #bbb;
            text-decoration: none;
            cursor: pointer;
        }

        /* --- RODAPÉ --- */
        .footer-simple-container {
            background-color: white;
            color: #14374d;
            padding: 20px;
            text-align: center;
            font-size: 0.9em;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            margin-top: 50px; /* Ajustado */
        }

        .footer-simple-container p {
            margin: 0;
        }

        /* --- ANIMAÇÃO --- */     
        @keyframes animaTexto{
            100%{           
                transform: translateY(0);           
                opacity: 1;
                transition: 3s;         
            }
        } 

        .gallery-container {
            transform: translateY(60px);
            opacity: 0;
            animation: animaTexto .5s ease-in-out .7s forwards;
        }

        /* --- RESPONSIVIDADE --- */
        @media (max-width: 768px) {
            header .interface {
                flex-direction: row; /* Manter logo e botão na mesma linha */
                justify-content: space-between; /* Espaço entre eles */
                padding: 10px 5%;
            }

            header nav.menu-desktop { /* Oculta o menu desktop em telas menores */
                display: none; 
            }

            .btn-abrir-menu { /* Mostra o botão do menu hambúrguer */
                display: block; 
            }

            .gallery-container {
                padding: 20px;
            }

            .image-grid {
                grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); /* Ajusta colunas para telas menores */
            }

       }

        @media (max-width: 480px) {
            header .logotipo img{
                width: 5rem; /* Ajuste o tamanho do logotipo para telas muito pequenas */
            }


            .gallery-container {
                font-size: 0.9rem;
                padding: 15px;
            }

            .image-grid {
                grid-template-columns: 1fr; /* Uma coluna em telas muito pequenas */
            }
        }
    </style>
